<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>Boris Fitness</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0ede8; --muted: #666;
    --teal: #1D9E75; --teal-dim: #0a2e22;
    --amber-dim: #2a1e00; --coral-dim: #2a1008;
    --purple-dim: #16143a; --blue-dim: #081829;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; padding-bottom: calc(80px + var(--safe-bottom)); }
  .top-bar { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 12px) 20px 12px; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .date-str { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 10px; cursor: pointer; transition: color .15s; }
  .nav-btn.active { color: var(--text); }
  .nav-btn svg { width: 20px; height: 20px; }
  .screen { display: none; padding: 16px 16px 0; }
  .screen.active { display: block; }
  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
  .day-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 4px; text-align: center; cursor: pointer; transition: all .15s; }
  .day-chip.active { border-color: var(--text); background: var(--surface2); }
  .day-chip.done { border-color: var(--teal); }
  .day-chip.rest-day { opacity: .45; }
  .chip-label { font-size: 9px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: transparent; margin: 0 auto; transition: background .15s; }
  .day-chip.done .chip-dot { background: var(--teal); }
  .day-chip.active .chip-dot { background: var(--text); }
  .session-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .session-header h2 { font-size: 20px; font-weight: 500; flex: 1; }
  .pill { border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .pill-teal { background: var(--teal-dim); color: #5DCAA5; }
  .pill-purple { background: var(--purple-dim); color: #AFA9EC; }
  .pill-amber { background: var(--amber-dim); color: #FAC775; }
  .pill-coral { background: var(--coral-dim); color: #F0997B; }
  .pill-blue { background: var(--blue-dim); color: #85B7EB; }
  .pill-gray { background: #1a1a1a; color: var(--muted); }
  .session-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; margin-top: -12px; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 8px; transition: border-color .15s; }
  .ex-card.completed { border-color: var(--teal); background: #0a1f18; }
  .ex-top { display: flex; align-items: flex-start; gap: 12px; }
  .ex-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .ex-check.checked { background: var(--teal); border-color: var(--teal); }
  .ex-check svg { width: 12px; height: 12px; opacity: 0; transition: opacity .15s; }
  .ex-check.checked svg { opacity: 1; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .ex-detail { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .set-tracker { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .set-btn { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--border); background: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; }
  .set-btn.done { background: var(--teal-dim); border-color: var(--teal); color: #5DCAA5; }
  .timer-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .timer-display { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; min-width: 70px; }
  .timer-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
  .timer-btn.primary { background: var(--teal-dim); border-color: var(--teal); color: #5DCAA5; }
  .yoga-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .yoga-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); cursor: pointer; transition: border-color .15s; }
  .phase-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .phase-label { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
  .phase-detail { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .session-note { background: var(--surface); border-left: 2px solid var(--border); border-radius: 0 8px 8px 0; padding: 12px; margin-top: 20px; margin-bottom: 20px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  .complete-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--teal); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-bottom: 24px; }
  .complete-btn.completed-state { background: var(--teal-dim); color: #5DCAA5; border: 1px solid var(--teal); }
  .history-empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; line-height: 1.7; }
  .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .history-card.completed-hist { border-color: var(--teal); }
  .history-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .history-progress { font-size: 12px; color: var(--muted); }
  .history-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .history-fill { height: 100%; background: var(--teal); border-radius: 2px; }
  .global-timer { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--teal); border-radius: 14px; padding: 12px 16px; display: none; align-items: center; gap: 12px; z-index: 50; }
  .global-timer.visible { display: flex; }
  .global-timer-label { font-size: 12px; color: var(--muted); flex: 1; }
  .global-timer-time { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--teal); font-weight: 500; }
  .global-timer-stop { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .sheet-backdrop.visible { opacity: 1; pointer-events: all; }
  .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); padding: 0 20px calc(32px + var(--safe-bottom)); z-index: 201; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); max-height: 80vh; overflow-y: auto; }
  .sheet.visible { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
  .sheet-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .sheet-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .sheet-poses-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .pose-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .pose-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .pose-sanskrit { font-weight: 400; color: var(--muted); font-size: 12px; }
  .pose-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .yt-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); text-decoration: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 9px; background: var(--surface2); margin-top: 10px; }
  .info-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 4px 9px; background: var(--surface2); margin-top: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Fitness</h1>
  <span class="date-str" id="dateStr"></span>
</div>

<div class="screen active" id="screen-workout">
  <div class="week-strip" id="weekStrip"></div>
  <div id="sessionContent"></div>
</div>

<div class="screen" id="screen-history">
  <div id="historyContent"></div>
</div>

<div class="global-timer" id="globalTimer">
  <span class="global-timer-label">Timer</span>
  <span class="global-timer-time" id="globalTimerTime">0:00</span>
  <button class="global-timer-stop" onclick="stopGlobalTimer()">Stop</button>
</div>

<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="sheet" id="yogaSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle"></div>
  <div class="sheet-desc" id="sheetDesc"></div>
  <div class="sheet-poses-label">Relevant poses</div>
  <div id="sheetPoses"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-workout" onclick="showScreen('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
    Today
  </button>
  <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
    History
  </button>
</nav>

<script>
const pullupPhases = [
  { label: "Weeks 1-3", detail: "3 sets of max clean reps (~3) + 3 negatives. Jump to top, lower in 4-5 sec." },
  { label: "Weeks 4-6", detail: "3 sets max reps + 2 negatives. Add 20-30 sec dead hang. Target: 5 reps." },
  { label: "Week 7+", detail: "Reassess -- likely 5-7 reps. Introduce 4 x 5 with full rest, drop negatives." },
];

const sunSal = { name: "Sun salutations", detail: "5 x Surya Namaskar A + 3-5 x Surya Namaskar B", sets: 1, info: "sunsal" };
const kneeRehab = [
  { name: "Terminal knee extension (TKE)", detail: "3 x 15 -- resistance band", sets: 3 },
  { name: "Wall sit", detail: "3 x 30-45 sec -- isometric quad loading", sets: 3, timer: 45 },
];
const coreLegs = [
  { name: "Goblet squat", detail: "4 x 8 -- progressive depth each set", sets: 4 },
  { name: "Single-leg deadlift", detail: "3 x 8 each -- dumbbells, balance + posterior chain", sets: 3 },
  { name: "Step-up", detail: "3 x 10 each leg -- controlled descent, no knee cave", sets: 3 },
  { name: "Single-leg calf raise", detail: "3 x 12 each -- slow eccentric", sets: 3 },
  { name: "Side plank + hip raise", detail: "3 x 10 each side -- lateral stability", sets: 3, timer: 30 },
  { name: "Dead bug", detail: "3 x 8 each side -- deep core, spinal stability", sets: 3 },
  { name: "Wave-Ki take-off", detail: "3-5 x 7-15 -- build volume as fitness returns", sets: 4 },
];
const cooldown = [
  { name: "Deep squat hold (assisted)", detail: "3 x 45 sec -- doorframe or dumbbell", sets: 3, timer: 45 },
  { name: "Kneeling stretch progression", detail: "Add 5-10 sec each week", sets: 1, timer: 30 },
];
const paddleSession = [
  { name: "Warm-up paddle", detail: "5 min -- let shoulders open up", sets: 1, timer: 300 },
  { name: "Continuous paddle", detail: "30 min -- moderate effort, ~1.7km", sets: 1, timer: 1800 },
  { name: "Cool-down + stretch", detail: "5 min easy, shoulder stretch on shore", sets: 1, timer: 300 },
];
const rowerSession = [
  { name: "Zone 2 steady state", detail: "25 min at 65-70% max HR -- hold a conversation", sets: 1, timer: 1500 },
  { name: "Cool-down row", detail: "5 min easy, drop rate", sets: 1, timer: 300 },
];

const days = [
  {
    label: "Mon", type: "Yoga + Strength", sub: "Sun sals, legs, core + knee rehab", pill: "pill-teal", duration: "75 min",
    sections: [
      { heading: "Sun salutations", exercises: [sunSal] },
      { heading: "Yoga - 25 min", yogaFoci: ["Hip flexors", "Glute activation", "Thoracic rotation", "Spinal extension", "Ankle + foot mobility"] },
      { heading: "Knee rehab", exercises: kneeRehab },
      { heading: "Legs + core", exercises: coreLegs },
      { heading: "Cool-down", exercises: cooldown },
    ],
    note: "TKE and wall sit are non-negotiable -- never skip them. Single-leg deadlift is your best surf-prep exercise."
  },
  {
    label: "Tue", type: "Paddle", sub: "Lake -- fish 5'6\"", pill: "pill-blue", duration: "45 min",
    sections: [
      { heading: "Sun salutations", exercises: [sunSal] },
      { heading: "Session", exercises: paddleSession },
    ],
    note: "Volume and stroke quality, not intensity. Clean catch angle, full extension."
  },
  {
    label: "Wed", type: "Rest", sub: "Sun salutations only", pill: "pill-gray", duration: "15 min",
    rest: true,
    sections: [
      { heading: "Sun salutations", exercises: [sunSal] },
    ],
  },
  {
    label: "Thu", type: "Row + Strength", sub: "Sun sals, zone 2 + legs, core", pill: "pill-amber", duration: "75 min",
    sections: [
      { heading: "Sun salutations", exercises: [sunSal] },
      { heading: "Waterrower - 30 min", exercises: rowerSession },
      { heading: "Knee rehab", exercises: kneeRehab },
      { heading: "Legs + core", exercises: coreLegs },
      { heading: "Cool-down", exercises: cooldown },
    ],
    note: "Heart rate monitor on for the row. Thursday is your heaviest day -- pace accordingly."
  },
  {
    label: "Fri", type: "Paddle", sub: "Lake -- fish 5'6\"", pill: "pill-blue", duration: "45 min",
    sections: [
      { heading: "Sun salutations", exercises: [sunSal] },
      { heading: "Session", exercises: paddleSession },
    ],
    note: "Second paddle of the week. If legs are heavy from Thursday, focus on stroke efficiency."
  },
  {
    label: "Sat", type: "Row + Yoga", sub: "Sun sals, zone 2 + recovery yoga", pill: "pill-purple", duration: "75 min",
    sections: [
      { heading: "Sun salutations", exercises: [sunSal] },
      { heading: "Waterrower - 30 min", exercises: rowerSession },
      { heading: "Yoga - 35 min", yogaFoci: ["Full body release", "Hip + hamstring", "Chest + pec stretch", "Shoulder opening", "Long holds"] },
    ],
    note: "Saturday closes the active week. The yoga here is slower and more restorative -- long holds, let the week unwind."
  },
  {
    label: "Sun", type: "Rest", sub: "Sun salutations only", pill: "pill-gray", duration: "15 min",
    rest: true,
    sections: [
      { heading: "Sun salutations", exercises: [sunSal] },
    ],
  },
];

const yogaInfo = {
  "sunsal": {
    desc: "Sun Salutation A is the foundation -- a dynamic sequence linking breath to movement that warms the spine, opens the hips and shoulders. Sun Salutation B adds Warrior I and Chair pose, increasing the leg load and intensity. 5A + 3-5B is a meaningful warm-up and on rest days keeps the body moving without significant load.",
    poses: [
      { name: "Sun Salutation A", sanskrit: "Surya Namaskar A", desc: "Mountain - arms up - forward fold - halfway lift - plank - chaturanga - updog - downdog. 5 rounds." },
      { name: "Sun Salutation B", sanskrit: "Surya Namaskar B", desc: "Adds Chair pose at the start and Warrior I on each side. More demanding -- 3-5 rounds." },
    ]
  },
  "Hip flexors": {
    desc: "The hip flexors -- primarily the iliopsoas -- lift the knee toward the chest. Surfers and desk workers tend to have chronically tight hip flexors, which pulls the pelvis forward and compresses the lower back. Lengthening these muscles improves paddling posture, pop-up mechanics and knee tracking.",
    poses: [
      { name: "Low lunge", sanskrit: "Anjaneyasana", desc: "Back knee down, front foot between hands. Sink hips forward and down. Hold 90 sec each side." },
      { name: "Crescent lunge", sanskrit: "Ashta Chandrasana", desc: "Same as low lunge but back knee lifted. Adds quad stretch and balance." },
      { name: "Lizard pose", sanskrit: "Utthan Pristhasana", desc: "Front foot outside the same-side hand. Deep hip flexor and groin stretch." },
    ]
  },
  "Glute activation": {
    desc: "Inactive glutes shift load to the knees and lower back. These movements wake up the glute med and glute max before heavier work.",
    poses: [
      { name: "Bridge pose", sanskrit: "Setu Bandha Sarvangasana", desc: "Lying on back, feet flat, press hips up. Squeeze glutes at the top." },
      { name: "Warrior III", sanskrit: "Virabhadrasana III", desc: "Standing on one leg, hinge forward. Strong glute activation for the standing leg." },
      { name: "Chair pose", sanskrit: "Utkatasana", desc: "Feet hip-width, sit back. Fires glutes and quads simultaneously." },
    ]
  },
  "Thoracic rotation": {
    desc: "The thoracic spine is designed to rotate, but paddling and desk work lock it up. For surfing, free thoracic rotation is essential for reading waves, trimming and turning.",
    poses: [
      { name: "Seated spinal twist", sanskrit: "Ardha Matsyendrasana", desc: "Seated, one leg extended, other crosses over. Twist toward the bent knee." },
      { name: "Supine twist", sanskrit: "Supta Matsyendrasana", desc: "On your back, knees fall to one side while arms open wide." },
      { name: "Thread the needle", sanskrit: "Parsva Balasana", desc: "On hands and knees, thread one arm under the body. Deep thoracic rotation." },
    ]
  },
  "Spinal extension": {
    desc: "Spinal extension counteracts the flexed-forward posture of surfing and paddling. It decompresses the discs, opens the front body and directly trains the pop-up position.",
    poses: [
      { name: "Cobra", sanskrit: "Bhujangasana", desc: "Prone, hands under shoulders, lift chest. Directly mimics the pop-up." },
      { name: "Upward facing dog", sanskrit: "Urdhva Mukha Svanasana", desc: "Like cobra but arms fully extended and thighs off the floor." },
      { name: "Bridge", sanskrit: "Setu Bandha Sarvangasana", desc: "Supine backbend -- gentler on the lumbar spine than floor backbends." },
    ]
  },
  "Ankle + foot mobility": {
    desc: "Ankle dorsiflexion limits squat depth, surf stance and knee tracking. Restricted ankles force the knee to collapse inward or the heel to rise.",
    poses: [
      { name: "Toes pose", sanskrit: "Prapadasana", desc: "Kneel sitting on heels with toes tucked under. Intense plantar fascia stretch. Hold 1-2 min." },
      { name: "Squat pose", sanskrit: "Malasana", desc: "Deep squat, heels down if possible. Trains ankle dorsiflexion directly." },
      { name: "Calf stretch at wall", sanskrit: "Functional", desc: "Hands on wall, one foot back, heel pressed down." },
    ]
  },
  "Full body release": {
    desc: "Long, passive holds to systematically release accumulated tension. The goal is parasympathetic activation -- the nervous system shifting from work mode to recovery mode.",
    poses: [
      { name: "Legs up the wall", sanskrit: "Viparita Karani", desc: "Legs vertical against a wall. Reverses blood flow, calms the nervous system. Hold 5-10 min." },
      { name: "Reclined butterfly", sanskrit: "Supta Baddha Konasana", desc: "On back, soles of feet together, knees fall wide. Passive hip opener." },
      { name: "Savasana", sanskrit: "Savasana", desc: "Full relaxation. 5 min minimum -- this is where integration happens." },
    ]
  },
  "Hip + hamstring": {
    desc: "Tight hamstrings tilt the pelvis and affect everything above and below. For surfing, flexibility here improves forward bend, pop-up landing and reduces lower back compression during paddling.",
    poses: [
      { name: "Seated forward fold", sanskrit: "Paschimottanasana", desc: "Legs extended, fold forward. Keep spine long -- use a strap if needed." },
      { name: "Half splits", sanskrit: "Ardha Hanumanasana", desc: "From lunge, straighten the front leg. Most targeted hamstring stretch." },
      { name: "Reclined hand to big toe", sanskrit: "Supta Padangusthasana", desc: "On back, strap around one foot, straighten leg. No lower back involvement." },
    ]
  },
  "Chest + pec stretch": {
    desc: "The pecs get chronically shortened by paddling and rowing, internally rotating the shoulder and contributing to rounded-shoulder posture common in surfers.",
    poses: [
      { name: "Fish pose", sanskrit: "Matsyasana", desc: "On back, arch upper back, chest opens to ceiling. Hold 1-2 min." },
      { name: "Supported fish", sanskrit: "Matsyasana variation", desc: "Block under thoracic spine. Fully passive chest and shoulder opener." },
      { name: "Camel pose", sanskrit: "Ustrasana", desc: "Kneeling, hands to heels, chest lifts. Strong active chest opener." },
    ]
  },
  "Shoulder opening": {
    desc: "Paddling and rowing shorten the anterior shoulder over time, pulling it forward. Shoulder opening lengthens the pec minor, anterior deltoid and biceps tendon.",
    poses: [
      { name: "Cow face arms", sanskrit: "Gomukhasana arms", desc: "One arm up bending behind head, other reaches up behind back. Deep opener for both sides." },
      { name: "Puppy pose", sanskrit: "Uttana Shishosana", desc: "On hands and knees, walk hands forward, lower chest to floor. Opens shoulder girdle and thoracic spine." },
      { name: "Eagle arms", sanskrit: "Garudasana arms", desc: "Arms cross and wrap, elbows lift. Stretches back of shoulder -- counter to all the pulling." },
    ]
  },
  "Long holds": {
    desc: "Holding poses for 2-5 minutes targets fascia and connective tissue rather than just muscles. Fascia needs sustained, moderate stress to remodel.",
    poses: [
      { name: "Yin dragon", sanskrit: "Anjaneyasana (yin)", desc: "Low lunge held passively for 3-5 min. The fascia needs this long to release." },
      { name: "Yin sleeping swan", sanskrit: "Yin Kapotasana", desc: "Pigeon pose held passively for 3-5 min. Targets deep hip rotators." },
      { name: "Supported fish", sanskrit: "Matsyasana variation", desc: "Block under thoracic spine. Completely passive. Hold 3-5 min." },
    ]
  },
};

let currentDayIdx = new Date().getDay();
currentDayIdx = currentDayIdx === 0 ? 6 : currentDayIdx - 1;
let activeTimer = null, timerSeconds = 0;

function getStorage() { try { return JSON.parse(localStorage.getItem('fitnessV3') || '{}'); } catch { return {}; } }
function setStorage(d) { try { localStorage.setItem('fitnessV3', JSON.stringify(d)); } catch {} }
function todayKey() { return new Date().toISOString().slice(0, 10); }
function sessionKey(dayIdx) { return todayKey() + '_' + dayIdx; }
function checkSvg() { return '<svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M2 6l3 3 5-5"/></svg>'; }

function renderDate() {
  document.getElementById('dateStr').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function renderWeekStrip() {
  const data = getStorage();
  document.getElementById('weekStrip').innerHTML = days.map((d, i) => {
    const isDone = Object.keys(data).some(k => k.split('_').pop() == i && data[k].completed);
    return `<div class="day-chip ${i===currentDayIdx?'active':''} ${isDone?'done':''} ${d.rest?'rest-day':''}" onclick="selectDay(${i})">
      <span class="chip-label">${d.label}</span>
      <div class="chip-dot"></div>
    </div>`;
  }).join('');
}

function selectDay(i) { currentDayIdx = i; renderWeekStrip(); renderSession(); }

function renderSession() {
  const day = days[currentDayIdx];
  const data = getStorage();
  const sKey = sessionKey(currentDayIdx);
  const sess = data[sKey] || { checks: {}, sets: {}, completed: false };
  let html = `<div class="session-header"><h2>${day.type}</h2><span class="pill ${day.pill}">${day.duration}</span></div>
    <p class="session-sub">${day.sub}</p>`;
  let exIdx = 0;
  day.sections.forEach(s => {
    html += `<div class="section-label">${s.heading}</div>`;
    if (s.yogaFoci) {
      const yKey = 'yoga_' + s.heading.replace(/\W+/g,'_');
      const yDone = sess.checks[yKey] || false;
      html += `<div class="ex-card ${yDone?'completed':''}">
        <div class="ex-top" style="margin-bottom:10px;">
          <button class="ex-check ${yDone?'checked':''}" onclick="toggleCheck('${yKey}')">${checkSvg()}</button>
          <div class="ex-info"><div class="ex-detail">Tap focus areas below for pose ideas</div></div>
        </div>
        <div class="yoga-tags">${s.yogaFoci.map(f=>`<span class="yoga-tag" onclick="openSheet('${f.replace(/'/g,"\\'")}')"> ${f} <span style="font-size:10px;opacity:.6;">i</span></span>`).join('')}</div>
      </div>`;
    } else if (s.pullup) {
      html += pullupPhases.map(p=>`<div class="phase-box"><div class="phase-label">${p.label}</div><div class="phase-detail">${p.detail}</div></div>`).join('');
      const pKey='pullup_'+s.heading; const pDone=sess.checks[pKey]||false;
      html += `<div class="ex-card ${pDone?'completed':''}"><div class="ex-top"><button class="ex-check ${pDone?'checked':''}" onclick="toggleCheck('${pKey}')">${checkSvg()}</button><div class="ex-info"><div class="ex-name">Pull-ups done</div></div></div>${renderSets(pKey,3,sess)}</div>`;
    } else {
      s.exercises.forEach(ex => {
        const eKey='ex_'+exIdx; const eDone=sess.checks[eKey]||false;
        const ytQ=encodeURIComponent(ex.name+' exercise form');
        const actionBtn = ex.info
          ? `<span class="info-link" onclick="openSheet('${ex.info}')">&#9432; What is this?</span>`
          : `<a href="https://www.youtube.com/results?search_query=${ytQ}" target="_blank" class="yt-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>Search on YouTube</a>`;
        html += `<div class="ex-card ${eDone?'completed':''}">
          <div class="ex-top"><button class="ex-check ${eDone?'checked':''}" onclick="toggleCheck('${eKey}')">${checkSvg()}</button>
          <div class="ex-info"><div class="ex-name">${ex.name}</div>${ex.detail?`<div class="ex-detail">${ex.detail}</div>`:''}</div></div>
          ${ex.sets?renderSets(eKey,ex.sets,sess):''}${ex.timer?renderTimer(ex.timer):''}
          ${actionBtn}
        </div>`;
        exIdx++;
      });
    }
  });
  if (day.note) html += `<div class="session-note">${day.note}</div>`;
  if (!day.rest) {
    html += `<button class="complete-btn ${sess.completed?'completed-state':''}" onclick="logSession()">${sess.completed?'Session logged!':'Log session as complete'}</button>`;
  }
  document.getElementById('sessionContent').innerHTML = html;
}

function renderSets(key, count, sess) {
  const done = sess.sets[key] || 0;
  return `<div class="set-tracker">${Array.from({length:count},(_,i)=>`<button class="set-btn ${i<done?'done':''}" onclick="toggleSet('${key}',${i+1},${count})">${i+1}</button>`).join('')}</div>`;
}

function renderTimer(seconds) {
  const m=Math.floor(seconds/60), s=seconds%60;
  return `<div class="timer-row"><div class="timer-display">${m>0?m+':'+(String(s).padStart(2,'0')):seconds+'s'}</div><button class="timer-btn primary" onclick="startTimer(${seconds})">Start</button></div>`;
}

function toggleCheck(key) {
  const data=getStorage(), sKey=sessionKey(currentDayIdx);
  if (!data[sKey]) data[sKey]={checks:{},sets:{},completed:false};
  data[sKey].checks[key]=!data[sKey].checks[key];
  setStorage(data); renderSession();
}

function toggleSet(key,setNum,total) {
  const data=getStorage(), sKey=sessionKey(currentDayIdx);
  if (!data[sKey]) data[sKey]={checks:{},sets:{},completed:false};
  const cur=data[sKey].sets[key]||0;
  data[sKey].sets[key]=cur>=setNum?setNum-1:setNum;
  if (data[sKey].sets[key]>=total) data[sKey].checks[key]=true;
  setStorage(data); renderSession();
}

function logSession() {
  const data=getStorage(), sKey=sessionKey(currentDayIdx);
  if (!data[sKey]) data[sKey]={checks:{},sets:{},completed:false};
  data[sKey].completed=true; data[sKey].day=days[currentDayIdx].type; data[sKey].date=todayKey();
  setStorage(data); renderWeekStrip(); renderSession();
}

function startTimer(seconds) {
  if (activeTimer) clearInterval(activeTimer);
  timerSeconds=seconds;
  const gt=document.getElementById('globalTimer');
  gt.classList.add('visible'); updateTimerDisplay();
  activeTimer=setInterval(()=>{
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds<=0) {
      clearInterval(activeTimer); activeTimer=null;
      document.getElementById('globalTimerTime').textContent='Done!';
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      setTimeout(()=>gt.classList.remove('visible'),2000);
    }
  },1000);
}

function updateTimerDisplay() {
  const m=Math.floor(timerSeconds/60), s=timerSeconds%60;
  document.getElementById('globalTimerTime').textContent=m>0?`${m}:${String(s).padStart(2,'0')}`:timerSeconds+'s';
}

function stopGlobalTimer() {
  if (activeTimer) clearInterval(activeTimer);
  activeTimer=null;
  document.getElementById('globalTimer').classList.remove('visible');
}

function openSheet(term) {
  const info=yogaInfo[term]; if (!info) return;
  document.getElementById('sheetTitle').textContent=term==='sunsal'?'Sun salutations A + B':term;
  document.getElementById('sheetDesc').textContent=info.desc;
  document.getElementById('sheetPoses').innerHTML=info.poses.map(p=>`<div class="pose-card"><div class="pose-name">${p.name} <span class="pose-sanskrit">${p.sanskrit}</span></div><div class="pose-desc">${p.desc}</div></div>`).join('');
  document.getElementById('sheetBackdrop').classList.add('visible');
  document.getElementById('yogaSheet').classList.add('visible');
}

function closeSheet() {
  document.getElementById('sheetBackdrop').classList.remove('visible');
  document.getElementById('yogaSheet').classList.remove('visible');
}

function renderHistory() {
  const data=getStorage();
  const sessions=Object.entries(data).filter(([,v])=>v.date).sort((a,b)=>b[0].localeCompare(a[0]));
  if (!sessions.length) { document.getElementById('historyContent').innerHTML='<div class="history-empty">No sessions logged yet.<br>Complete your first workout<br>and it will appear here.</div>'; return; }
  let html='', lastDate='';
  sessions.forEach(([key,sess])=>{
    if (sess.date!==lastDate) {
      html+=`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px;">${new Date(sess.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>`;
      lastDate=sess.date;
    }
    const dayIdx=parseInt(key.split('_').pop()), day=days[dayIdx]||{};
    const total=Object.keys(sess.checks||{}).length, done=Object.values(sess.checks||{}).filter(Boolean).length;
    const pct=total>0?Math.round(done/total*100):100;
    html+=`<div class="history-card ${sess.completed?'completed-hist':''}"><div class="history-name">${sess.day||day.type||'Session'}</div><div class="history-progress">${sess.completed?'Completed':'In progress'} &middot; ${done}/${total||'?'} checked</div><div class="history-bar"><div class="history-fill" style="width:${pct}%"></div></div></div>`;
  });
  document.getElementById('historyContent').innerHTML=html;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='history') renderHistory();
}

document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
renderDate(); renderWeekStrip(); renderSession();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/Fitness-App/sw.js').catch(()=>{});
</script>
</body>
</html>
